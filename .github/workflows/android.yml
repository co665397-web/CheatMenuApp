name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix Line Endings for gradlew
      run: |
        sed -i 's/\r$//' ./CheatMenuApp/gradlew
        chmod +x ./CheatMenuApp/gradlew

    - name: Build with Gradle
      run: |
        cd CheatMenuApp
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: CheatMenuApp/app/build/outputs/apk/debug/*.apk
